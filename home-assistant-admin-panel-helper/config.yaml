name: Home Assistant Admin Panel Helper
version: "1.0.0"
slug: home_assistant_admin_panel_helper
description: "A proxy to expose selected Supervisor API calls, for Home Assistant Admin Panel"
startup: "services"
boot: "auto"
host_network: true
options:
  api_key: "your-secret-api-key"
schema:
  api_key: "str"
privileged:
  - NET_ADMIN
  - SYS_ADMIN
hassio_api: true
auth_api: true
map:
  - "config:rw"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
